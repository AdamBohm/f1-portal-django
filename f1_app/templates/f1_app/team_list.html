{% extends 'f1_app/base.html' %}
{% block content %}
<h2 class="fw-bold mb-4" style="border-left: 5px solid #E10600; padding-left: 10px;">Seznam stájí F1</h2>

<div class="row">
    {% for team in teams %}
    <div class="col-md-4 mb-4">
        <div class="card f1-card h-100" style="border-top: 5px solid {{ team.barva_hex }};">
            <div class="card-body d-flex flex-column">
                <h4 class="card-title fw-bold">{{ team.nazev }}</h4>
                <p class="card-text text-muted mb-4">Šéf týmu: <strong>{{ team.sef }}</strong></p>
                <div class="mt-auto">
                    <a href="{% url 'team_detail' team.id %}" class="btn btn-f1 w-100">Detail týmu & Jezdci</a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <p>Zatím nebyly přidány žádné týmy.</p>
    {% endfor %}
</div>
{% endblock %}
