<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --f1-red: #E10600; --f1-black: #15151E; }
        body { background-color: #F3F3F3; font-family: 'Titillium Web', sans-serif; }
        .navbar-f1 { background-color: var(--f1-black); border-bottom: 4px solid var(--f1-red); }
        .f1-card { border: none; border-radius: 0; border-top: 4px solid var(--f1-red); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-f1 { background-color: var(--f1-red); color: white; border-radius: 0; font-weight: bold; }
        .btn-f1:hover { background-color: #b80500; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-f1 mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="{% url 'home' %}" style="letter-spacing: 2px;">
            <span style="color: var(--f1-red);">F1</span>_PORTAL
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white px-3" href="{% url 'home' %}">Úvod</a>
            <a class="nav-link text-white px-3" href="{% url 'team_list' %}">Týmy a Jezdci</a>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer class="text-center py-4 mt-5 text-muted" style="background-color: var(--f1-black); color: white !important;">
    <p>&copy; 2026 - Školní projekt F1</p>
</footer>

</body>
</html>
